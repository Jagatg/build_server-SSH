name: SSH Debug Runner (Upterm + Byobu)

on:
  workflow_dispatch:

jobs:
  ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Install Byobu
        run: |
          sudo apt-get update
          sudo apt-get install -y byobu

      - name: Start SSH session
        uses: owenthereal/action-upterm@v1
        with:
          command: |
            byobu new-session -d -s debug
            echo "SSH session ready."
            echo "Run: byobu attach -t debug"
            while true; do
              sleep 60
            done
