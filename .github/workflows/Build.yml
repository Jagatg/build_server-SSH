name: Build Android ROM

on:
  workflow_dispatch:
    inputs:
      MANIFEST_URL:
        description: 'Manifest repository URL'
        required: true
        type: string
      MANIFEST_BRANCH:
        description: 'Manifest branch'
        required: true
        type: string
      LOCAL_MANIFEST_REPO:
        description: 'Local manifest repository URL (optional)'
        required: false
        type: string
      LOCAL_MANIFEST_BRANCH:
        description: 'Local manifest branch (optional)'
        required: false
        type: string
      DEVICE_REPO:
        description: 'Device tree repository URL (optional)'
        required: false
        type: string
      DEVICE_PATH:
        description: 'Device tree destination path (optional)'
        required: false
        type: string
      DEVICE_COMMON_REPO:
        description: 'Device common tree repository URL (optional)'
        required: false
        type: string
      DEVICE_COMMON_PATH:
        description: 'Device common tree destination path (optional)'
        required: false
        type: string
      VENDOR_REPO:
        description: 'Vendor tree repository URL (optional)'
        required: false
        type: string
      VENDOR_PATH:
        description: 'Vendor tree destination path (optional)'
        required: false
        type: string
      VENDOR_COMMON_REPO:
        description: 'Vendor common tree repository URL (optional)'
        required: false
        type: string
      VENDOR_COMMON_PATH:
        description: 'Vendor common tree destination path (optional)'
        required: false
        type: string
      KERNEL_REPO:
        description: 'Kernel repository URL (optional)'
        required: false
        type: string
      KERNEL_PATH:
        description: 'Kernel destination path (optional)'
        required: false
        type: string
      PREBUILTS_KERNEL_REPO:
        description: 'Prebuilt kernel repository URL (optional)'
        required: false
        type: string
      PREBUILTS_KERNEL_PATH:
        description: 'Prebuilt kernel destination path (optional)'
        required: false
        type: string
      DOLBY_DEVICE_REPO:
        description: 'Dolby device repository URL (optional)'
        required: false
        type: string
      DOLBY_DEVICE_PATH:
        description: 'Dolby device destination path (optional)'
        required: false
        type: string
      DOLBY_VENDOR_REPO:
        description: 'Dolby vendor repository URL (optional)'
        required: false
        type: string
      DOLBY_VENDOR_PATH:
        description: 'Dolby vendor destination path (optional)'
        required: false
        type: string
      MIUICAMERA_DEVICE_REPO:
        description: 'MIUI camera device repository URL (optional)'
        required: false
        type: string
      MIUICAMERA_DEVICE_PATH:
        description: 'MIUI camera device destination path (optional)'
        required: false
        type: string
      MIUICAMERA_VENDOR_REPO:
        description: 'MIUI camera vendor repository URL (optional)'
        required: false
        type: string
      MIUICAMERA_VENDOR_PATH:
        description: 'MIUI camera vendor destination path (optional)'
        required: false
        type: string
      REMOVE_FOLDERS:
        description: 'Space-separated list of folders to remove (relative to /tmp/src/android)'
        required: false
        type: string
      LUNCH_COMMAND:
        description: 'Lunch command to execute'
        required: true
        type: string
      BUILD_COMMAND:
        description: 'Build command to execute'
        required: true
        type: string

jobs:
  build:
    runs-on: self-hosted
    timeout-minutes: 1440
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install repo tool if missing
        run: |
          if ! command -v repo &> /dev/null; then
            mkdir -p ~/.bin
            curl -o ~/.bin/repo https://storage.googleapis.com/git-repo-downloads/repo
            chmod a+x ~/.bin/repo
            echo "$HOME/.bin" >> "$GITHUB_PATH"
          else
            echo "repo tool already installed"
          fi

      - name: Configure git user/email
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@users.noreply.github.com"

      - name: Create workspace
        run: |
          mkdir -p /tmp/src/android

      - name: repo init
        working-directory: /tmp/src/android
        run: |
          repo init -u "${{ inputs.MANIFEST_URL }}" -b "${{ inputs.MANIFEST_BRANCH }}" --git-lfs

      - name: repo sync
        working-directory: /tmp/src/android
        run: |
          repo sync --force-sync --no-clone-bundle --no-tags -c -j$(nproc)

      - name: Clone optional local manifest
        working-directory: /tmp/src/android
        run: |
          LOCAL_MANIFEST_REPO="${{ inputs.LOCAL_MANIFEST_REPO }}"
          LOCAL_MANIFEST_BRANCH="${{ inputs.LOCAL_MANIFEST_BRANCH }}"

          if [ -n "$LOCAL_MANIFEST_REPO" ]; then
            mkdir -p .repo/local_manifests
            if [ -n "$LOCAL_MANIFEST_BRANCH" ]; then
              git clone --depth=1 -b "$LOCAL_MANIFEST_BRANCH" "$LOCAL_MANIFEST_REPO" .repo/local_manifests
            else
              git clone --depth=1 "$LOCAL_MANIFEST_REPO" .repo/local_manifests
            fi
            repo sync --force-sync --no-clone-bundle --no-tags -c -j$(nproc)
          else
            echo "No local manifest provided, skipping"
          fi

      - name: Remove folders
        working-directory: /tmp/src/android
        run: |
          REMOVE_FOLDERS="${{ inputs.REMOVE_FOLDERS }}"

          if [ -n "$REMOVE_FOLDERS" ]; then
            for folder in $REMOVE_FOLDERS; do
              echo "Removing $folder"
              rm -rf "/tmp/src/android/$folder"
            done
          else
            echo "No folders to remove"
          fi

      - name: Clone optional repositories
        working-directory: /tmp/src/android
        run: |
          clone_repo() {
            repo="$1"
            path="$2"

            if [ -z "$repo" ] || [ -z "$path" ]; then
              echo "Skipping clone, repo or path not provided"
              return 0
            fi

            full_path="/tmp/src/android/$path"

            if [ -d "$full_path" ]; then
              echo "Removing existing $full_path"
              rm -rf "$full_path"
            fi

            mkdir -p "$(dirname "$full_path")"

            echo "Cloning $repo into $full_path"
            git clone --depth=1 "$repo" "$full_path"
          }

          clone_repo "${{ inputs.DEVICE_REPO }}" "${{ inputs.DEVICE_PATH }}"
          clone_repo "${{ inputs.DEVICE_COMMON_REPO }}" "${{ inputs.DEVICE_COMMON_PATH }}"
          clone_repo "${{ inputs.VENDOR_REPO }}" "${{ inputs.VENDOR_PATH }}"
          clone_repo "${{ inputs.VENDOR_COMMON_REPO }}" "${{ inputs.VENDOR_COMMON_PATH }}"
          clone_repo "${{ inputs.KERNEL_REPO }}" "${{ inputs.KERNEL_PATH }}"
          clone_repo "${{ inputs.PREBUILTS_KERNEL_REPO }}" "${{ inputs.PREBUILTS_KERNEL_PATH }}"
          clone_repo "${{ inputs.DOLBY_DEVICE_REPO }}" "${{ inputs.DOLBY_DEVICE_PATH }}"
          clone_repo "${{ inputs.DOLBY_VENDOR_REPO }}" "${{ inputs.DOLBY_VENDOR_PATH }}"
          clone_repo "${{ inputs.MIUICAMERA_DEVICE_REPO }}" "${{ inputs.MIUICAMERA_DEVICE_PATH }}"
          clone_repo "${{ inputs.MIUICAMERA_VENDOR_REPO }}" "${{ inputs.MIUICAMERA_VENDOR_PATH }}"

      - name: Build ROM
        working-directory: /tmp/src/android
        run: |
          source build/envsetup.sh
          ${{ inputs.LUNCH_COMMAND }}
          stdbuf -oL -eL bash -c "${{ inputs.BUILD_COMMAND }}" 2>&1 | tee build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: /tmp/src/android/build.log

      - name: Upload build output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: /tmp/src/android/out/target/product/
